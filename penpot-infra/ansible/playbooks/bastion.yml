- hosts: bastion
  become: yes
  tasks:
    - name: Create user bastion first
      ansible.builtin.user:
        name: "{{bastion_username}}"
        shell: /bin/bash
        groups: sudo
        append: yes
        password: "{{bastion_password | password_hash('sha512') }}"
        create_home: yes

    - name: Create .ssh directory for bastion user
      ansible.builtin.file:
        path: /home/bastion/.ssh
        state: directory
        owner: bastion
        group: bastion
        mode: '0700'

    - name: Copy SSH authorized_keys to bastion user
      ansible.builtin.copy:
        src: /home/admin/.ssh/authorized_keys
        dest: /home/bastion/.ssh/authorized_keys
        owner: bastion
        group: bastion
        mode: '0600'
        remote_src: yes

    - name: Enable PubkeyAuthentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PubkeyAuthentication'
        line: 'PubkeyAuthentication yes'
        validate: '/usr/sbin/sshd -t -f %s'
      notify:
        - restart ssh

    - name: Port 20100
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?Port 22'
        line: 'Port 20100'
        validate: '/usr/sbin/sshd -t -f %s'
      notify:
        - restart ssh

    - name: Disable PasswordAuthentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
        validate: '/usr/sbin/sshd -t -f %s'
      notify:
        - restart ssh

    - name: Disable KbdInteractiveAuthentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?KbdInteractiveAuthentication'
        line: 'KbdInteractiveAuthentication no'
        validate: '/usr/sbin/sshd -t -f %s'
      notify:
        - restart ssh

    - name: Allow admin and bastion users
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?AllowUsers'
        line: 'AllowUsers admin bastion'
        validate: '/usr/sbin/sshd -t -f %s'
      notify:
        - restart ssh

    - name: Disable root login
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
        validate: '/usr/sbin/sshd -t -f %s'
      notify:
        - restart ssh

    - name: Disable PermitTunnel
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitTunnel'
        line: 'PermitTunnel no'
        validate: '/usr/sbin/sshd -t -f %s'
      notify:
        - restart ssh

    - name: Disable X11 forwarding
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?X11Forwarding'
        line: 'X11Forwarding no'
        validate: '/usr/sbin/sshd -t -f %s'
      notify:
        - restart ssh




    











  handlers:
    - name: restart ssh
      ansible.builtin.service:
        name: sshd
        state: restarted



    
