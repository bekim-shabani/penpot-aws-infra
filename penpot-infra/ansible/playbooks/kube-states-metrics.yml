---
- name: Deploy Kube State Metrics to EKS cluster
  hosts: localhost
  connection: local
  gather_facts: no
  vars:
    cluster_name: "penpotproject"
    aws_region: "eu-north-1"
    namespace: "monitoring"

  tasks:
    - name: Configure kubectl for EKS cluster
      shell: |
        aws eks update-kubeconfig --name {{ cluster_name }} --region {{ aws_region }}
      environment:
        AWS_DEFAULT_REGION: "{{ aws_region }}"

    - name: Ensure monitoring namespace exists
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ namespace }}"
            labels:
              name: monitoring

    - name: Create ServiceAccount for kube-state-metrics
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: kube-state-metrics
            namespace: "{{ namespace }}"

    - name: Create ClusterRole for kube-state-metrics
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: kube-state-metrics
          rules:
            - apiGroups: [""]
              resources:
                - configmaps
                - secrets
                - nodes
                - pods
                - services
                - resourcequotas
                - replicationcontrollers
                - limitranges
                - persistentvolumeclaims
                - persistentvolumes
                - namespaces
                - endpoints
              verbs: ["list", "watch"]
            - apiGroups: ["apps"]
              resources:
                - daemonsets
                - deployments
                - replicasets
                - statefulsets
              verbs: ["list", "watch"]
            - apiGroups: ["batch"]
              resources:
                - cronjobs
                - jobs
              verbs: ["list", "watch"]
            - apiGroups: ["autoscaling"]
              resources:
                - horizontalpodautoscalers
              verbs: ["list", "watch"]
            - apiGroups: ["policy"]
              resources:
                - poddisruptionbudgets
              verbs: ["list", "watch"]
            - apiGroups: ["certificates.k8s.io"]
              resources:
                - certificatesigningrequests
              verbs: ["list", "watch"]
            - apiGroups: ["storage.k8s.io"]
              resources:
                - storageclasses
                - volumeattachments
              verbs: ["list", "watch"]
            - apiGroups: ["networking.k8s.io"]
              resources:
                - networkpolicies
                - ingresses
              verbs: ["list", "watch"]
            - apiGroups: ["admissionregistration.k8s.io"]
              resources:
                - mutatingwebhookconfigurations
                - validatingwebhookconfigurations
              verbs: ["list", "watch"]
            - apiGroups: ["coordination.k8s.io"]
              resources:
                - leases
              verbs: ["list", "watch"]
            - apiGroups: ["autoscaling.k8s.io"]
              resources:
                - verticalpodautoscalers
              verbs: ["list", "watch"]

    - name: Create ClusterRoleBinding for kube-state-metrics
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: kube-state-metrics
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: kube-state-metrics
          subjects:
            - kind: ServiceAccount
              name: kube-state-metrics
              namespace: "{{ namespace }}"

    - name: Deploy kube-state-metrics Deployment
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: kube-state-metrics
            namespace: "{{ namespace }}"
            labels:
              app: kube-state-metrics
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: kube-state-metrics
            template:
              metadata:
                labels:
                  app: kube-state-metrics
              spec:
                serviceAccountName: kube-state-metrics
                containers:
                  - name: kube-state-metrics
                    image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.13.0
                    ports:
                      - name: http-metrics
                        containerPort: 8080
                        protocol: TCP
                      - name: telemetry
                        containerPort: 8081
                        protocol: TCP
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: 8080
                      initialDelaySeconds: 5
                      timeoutSeconds: 5
                    readinessProbe:
                      httpGet:
                        path: /
                        port: 8081
                      initialDelaySeconds: 5
                      timeoutSeconds: 5
                    resources:
                      limits:
                        cpu: 100m
                        memory: 190Mi
                      requests:
                        cpu: 10m
                        memory: 190Mi
                    securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
                      readOnlyRootFilesystem: true
                      runAsUser: 65534
                      runAsNonRoot: true
                securityContext:
                  fsGroup: 65534
                  runAsGroup: 65534
                  runAsNonRoot: true
                  runAsUser: 65534

    - name: Create Service for kube-state-metrics
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: kube-state-metrics
            namespace: "{{ namespace }}"
            labels:
              app: kube-state-metrics
            annotations:
              prometheus.io/scrape: "true"
              prometheus.io/port: "8080"
          spec:
            type: ClusterIP
            selector:
              app: kube-state-metrics
            ports:
              - name: http-metrics
                port: 8080
                targetPort: http-metrics
                protocol: TCP
              - name: telemetry
                port: 8081
                targetPort: telemetry
                protocol: TCP

    - name: Wait for kube-state-metrics pod to be ready
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ namespace }}"
        label_selectors:
          - app=kube-state-metrics
      register: ksm_pods
      until: ksm_pods.resources | selectattr('status.phase', 'equalto', 'Running') | list | length >= 1
      retries: 10
      delay: 10

    - name: Display kube-state-metrics deployment status
      debug:
        msg: "Kube-state-metrics deployed successfully! Pod is running and exposing metrics on port 8080."
