        dest: /etc/cloudwatch-exporter/config.yml
        owner: cloudwatch-exporter
        group: cloudwatch-exporter
        mode: '0644'
      notify: restart cloudwatch-exporter

    - name: Create systemd service file
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=CloudWatch Exporter
          After=network.target

          [Service]
          Type=simple
          User=cloudwatch-exporter
          Group=cloudwatch-exporter
          ExecStart=/usr/bin/java -jar /opt/cloudwatch-exporter/cloudwatch_exporter.jar {{ cloudwatch_exporter_port }} /etc/cloudwatch-exporter/config.yml
          Restart=on-failure
          RestartSec=5

          # Security hardening
          NoNewPrivileges=true
          PrivateTmp=true
          ProtectSystem=strict
          ProtectHome=true
          ReadWritePaths=/var/lib/cloudwatch-exporter

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/cloudwatch-exporter.service
        mode: '0644'
      notify: restart cloudwatch-exporter

    - name: Enable and start CloudWatch Exporter
      ansible.builtin.systemd:
        name: cloudwatch-exporter
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Wait for CloudWatch Exporter to be ready
      ansible.builtin.wait_for:
        port: "{{ cloudwatch_exporter_port }}"
        delay: 5
        timeout: 30

    - name: Display CloudWatch Exporter status
      ansible.builtin.debug:
        msg: "CloudWatch Exporter is running on port {{ cloudwatch_exporter_port }}"

  handlers:
    - name: restart cloudwatch-exporter
      ansible.builtin.systemd:
        name: cloudwatch-exporter
        state: restarted

    - name: reload prometheus
      ansible.builtin.systemd:
        name: prometheus
        state: reloaded
