---
- name: Deploy CloudWatch Exporter for Prometheus
  hosts: prometheus
  become: yes
  gather_facts: yes

  vars:
    cloudwatch_exporter_version: "0.15.5"
    cloudwatch_exporter_port: 9106
    aws_region: "eu-north-1"
    alb_name: "loadbalancer/app/penpotproject-alb/83368a4bac213597"
    rds_instance_id_prod: "penpotproject-prod"
    rds_instance_id_preprod: "penpotproject-preprod"
    redis_cluster_id: "penpotproject"

  tasks:
    - name: Install Java (required for CloudWatch Exporter)
      ansible.builtin.apt:
        name:
          - default-jre-headless
        state: present
        update_cache: yes
      when: ansible_facts['os_family'] == "Debian"

    - name: Install Java (RHEL/CentOS)
      ansible.builtin.yum:
        name:
          - java-11-openjdk-headless
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    - name: Create cloudwatch-exporter user
      ansible.builtin.user:
        name: cloudwatch-exporter
        system: yes
        shell: /bin/false
        createhome: no

    - name: Create directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: cloudwatch-exporter
        group: cloudwatch-exporter
        mode: '0755'
      loop:
        - /opt/cloudwatch-exporter
        - /etc/cloudwatch-exporter
        - /var/lib/cloudwatch-exporter

    - name: Download CloudWatch Exporter
      ansible.builtin.get_url:
        url: "https://github.com/prometheus/cloudwatch_exporter/releases/download/v{{ cloudwatch_exporter_version }}/cloudwatch_exporter-{{ cloudwatch_exporter_version }}-jar-with-dependencies.jar"
        dest: "/opt/cloudwatch-exporter/cloudwatch_exporter.jar"
        owner: cloudwatch-exporter
        group: cloudwatch-exporter
        mode: '0644'
#service cloud watch
    - name: Create CloudWatch Exporter configuration
      ansible.builtin.copy:
        content: |
          ---
          region: {{ aws_region }}
          metrics:
            # Nombre de requêtes HTTP
            - aws_namespace: AWS/ApplicationELB
              aws_metric_name: RequestCount
              aws_dimensions:
                - LoadBalancer
              aws_dimension_select:
                LoadBalancer: ["{{ alb_name }}"]
              aws_statistics:
                - Sum
              period_seconds: 60
              range_seconds: 300

            # Temps de réponse moyen
            - aws_namespace: AWS/ApplicationELB
              aws_metric_name: TargetResponseTime
              aws_dimensions:
                - LoadBalancer
              aws_dimension_select:
                LoadBalancer: ["{{ alb_name }}"]
              aws_statistics:
                - Average
              period_seconds: 60
              range_seconds: 300

            # Codes HTTP 2xx (succès)
            - aws_namespace: AWS/ApplicationELB
              aws_metric_name: HTTPCode_Target_2XX_Count
              aws_dimensions:
                - LoadBalancer
              aws_dimension_select:
                LoadBalancer: ["{{ alb_name }}"]
              aws_statistics:
                - Sum
              period_seconds: 60
              range_seconds: 300

            # Codes HTTP 4xx (erreurs client)
            - aws_namespace: AWS/ApplicationELB
              aws_metric_name: HTTPCode_Target_4XX_Count
              aws_dimensions:
                - LoadBalancer
              aws_dimension_select:
                LoadBalancer: ["{{ alb_name }}"]
              aws_statistics:
                - Sum
              period_seconds: 60
              range_seconds: 300

            # Codes HTTP 5xx (erreurs serveur)
            - aws_namespace: AWS/ApplicationELB
              aws_metric_name: HTTPCode_Target_5XX_Count
              aws_dimensions:
                - LoadBalancer
              aws_dimension_select:
                LoadBalancer: ["{{ alb_name }}"]
              aws_statistics:
                - Sum
              period_seconds: 60
              range_seconds: 300

            # Connexions actives
            - aws_namespace: AWS/ApplicationELB
              aws_metric_name: ActiveConnectionCount
              aws_dimensions:
                - LoadBalancer
              aws_dimension_select:
                LoadBalancer: ["{{ alb_name }}"]
              aws_statistics:
                - Sum
              period_seconds: 60
              range_seconds: 300

            # Healthy targets
            - aws_namespace: AWS/ApplicationELB
              aws_metric_name: HealthyHostCount
              aws_dimensions:
                - LoadBalancer
              aws_dimension_select:
                LoadBalancer: ["{{ alb_name }}"]
              aws_statistics:
                - Average
              period_seconds: 60
              range_seconds: 300

            # Unhealthy targets
            - aws_namespace: AWS/ApplicationELB
              aws_metric_name: UnHealthyHostCount
              aws_dimensions:
                - LoadBalancer
              aws_dimension_select:
                LoadBalancer: ["{{ alb_name }}"]
