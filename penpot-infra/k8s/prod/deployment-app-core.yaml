# ============================================================
# Deployment app-core — prod
# frontend + backend + mcp (sans storybook)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-core
  namespace: prod
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0        # ← pas de pod supplémentaire. Kubernetes ne créera jamais plus de replicas pods
      maxUnavailable: 1  # ← 1 pod peut être indisponible pendant le update
  selector:
    matchLabels:
      pod: app-core
  template:
    metadata:
      labels:
        pod: app-core
    spec:
      imagePullSecrets:
        - name: registry-secret
      initContainers:
        - name: fix-permissions
          image: busybox
          command: [ "chmod", "-R", "777", "/opt/data/assets" ]
          volumeMounts:
            - name: penpot-assets
              mountPath: /opt/data/assets
          securityContext:
            runAsUser: 0
      volumes:
        - name: penpot-assets
          persistentVolumeClaim:
            claimName: penpot-assets-pvc
      containers:

        # --- Frontend (port 8080) ---
        - name: frontend
          image: registry.gitlab.com/penpotproject/penpot/penpot-frontend:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: penpot-config
          volumeMounts:
            - name: penpot-assets
              mountPath: /opt/data/assets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6

        # --- Backend (port 6060) ---
        - name: backend
          image: registry.gitlab.com/penpotproject/penpot/penpot-backend:latest
          envFrom:
            - configMapRef:
                name: penpot-config
          env:
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx512m"
            - name: PENPOT_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
            - name: PENPOT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: PENPOT_SECRET_KEY
            - name: PENPOT_SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: PENPOT_SMTP_USERNAME
            - name: PENPOT_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: PENPOT_SMTP_PASSWORD
          volumeMounts:
            - name: penpot-assets
              mountPath: /opt/data/assets
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /api/rpc/command/get-profile
              port: 6060
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 10
            timeoutSeconds: 5

        # --- MCP (ports 4401 + 4402) ---
        - name: mcp
          image: registry.gitlab.com/penpotproject/penpot/penpot-mcp:latest
          ports:
            - containerPort: 4401
              name: http
            - containerPort: 4402
              name: ws
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"